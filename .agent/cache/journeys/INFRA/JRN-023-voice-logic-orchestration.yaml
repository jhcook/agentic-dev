id: JRN-023
title: Voice Logic Orchestration
state: COMMITTED
schema_version: 1
priority: medium
tags:
- infra
- voice
actor: developer using voice assistant
description: Implement the core orchestration logic for real-time voice interaction.
  This involves creating a FastAPI WebSocket endpoint (`/ws/voice`) that manages the
  audio stream, pipes usage to a stateful ReAct agent (LangGraph), and streams synthesized
  response audio back to the client using the providers defined in INFRA-027.
preconditions:
- Agent CLI is installed and configured
- Developer is in a project directory with .agent/ initialized
auth_context:
  level: authenticated
  permissions: []
steps:
- id: 1
  action: Developer starts voice session via WebSocket or admin console
  system_response: Voice agent initializes STT/TTS pipeline
  assertions:
  - WebSocket connection established
  - Audio pipeline ready
- id: 2
  action: Developer speaks a command or question
  system_response: System transcribes speech, processes intent, generates response
  assertions:
  - Transcription is accurate
  - Response is relevant
- id: 3
  action: Developer receives spoken response
  system_response: TTS converts response to speech, streams audio back
  assertions:
  - Audio plays clearly
  - Latency is acceptable
error_paths:
- trigger_step: 1
  condition: Missing configuration or prerequisites
  system_response: CLI displays clear error with remediation steps
  assertions:
  - Error message is actionable
  severity: expected
edge_cases:
- scenario: Command run with no network access
  expected: Graceful degradation or clear offline error
  severity: warning
data_state:
  data_classification: internal
  inputs: []
  persistent: []
linked_stories:
- INFRA-028
linked_adrs: []
depends_on: []
implementation:
  routes: []
  files:
  - .agent/docs/architecture/infra-143-domain-isolation.md
  - .agent/docs/features/sr-replace-validation.md
  - .agent/docs/tools.md
  - .agent/src/agent/cli.py
  - .agent/src/agent/commands/audit.py
  - .agent/src/agent/commands/utils.py
  - .agent/src/agent/tools/__init__.py
  - .agent/src/agent/tools/knowledge.py
  - .agent/src/agent/tools/project.py
  - .agent/src/agent/tools/telemetry.py
  - .agent/src/agent/utils/rollback_infra_143.py
  - .agent/src/agent/utils/tool_security.py
  - .agent/tests/agent/tools/test_knowledge.py
  - .agent/tests/agent/tools/test_project.py
  - .agent/tests/agent/tools/test_telemetry.py
  - .agent/tests/agent/utils/test_tool_security.py
  - .agent/tests/commands/test_sr_semantic_infra_180.py
  - .agent/tests/tools/__init__.py
  - .agent/tests/tools/test_registry.py
  - CHANGELOG.md
  tests:
  - .agent/tests/journeys/test_jrn_023.py
