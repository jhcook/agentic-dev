panel:   # native | adk
  engine: adk
  num_retries: 5
agent:     # anthropic | gemini | gh | ollama | openai | vertex
  provider: vertex
  test_commands:
    .agent/: cd .agent/src && python -m pytest agent/ -q --tb=short
  models:
    gemini: models/gemini-3-pro-preview
    vertex: gemini-2.5-pro
    openai: gpt-4o
  github:
    tool: mcp
  mcp:
    servers:
      notion:
        command: npx
        args:
        - -y
        - '@notionhq/notion-mcp-server'
        env:
          NOTION_KEY: ${NOTION_TOKEN}
      notebooklm:
        command: uv
        args:
        - tool
        - run
        - --from
        - notebooklm-mcp-server
        - notebooklm-mcp
console:
  personality_file: GEMINI.md
  system_prompt: "You are a collaborative pair-programmer embedded in this repository.\n\
    You work alongside the developer \u2014 proactive but never surprising.\n\n##\
    \ Communication Style\n- Be a good mentor and coach\n- Do not execute destructive\
    \ actions, e.g., commit, without explicit user approval\n- Explain your reasoning\
    \ when making decisions\n- Acknowledge mistakes warmly and correct course\n- Take\
    \ proactive but bounded initiative\n- Ask for clarification rather than assuming\n\
    - Format responses in markdown for readability\n- Be concise but not cold \u2014\
    \ you're a colleague, not a terminal\n"
env:
  CLOUD_ML_REGION: australia-southeast1
  NO_PROXY: australia-southeast1-aiplatform.googleapis.com,oauth2.googleapis.com,us-central1-aiplatform.googleapis.com,.googleapis.com
  AGENT_MAX_CONCURRENT_API_CALLS: '5'
