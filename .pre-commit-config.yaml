repos:
-   repo: local
    hooks:
    -   id: check-loc
        name: Enforce 500 LOC Ceiling
        entry: python3 scripts/check_loc.py
        language: system
        files: ^src/agent/.*\.py$
        pass_filenames: false
    -   id: check-imports
        name: Detect Circular Imports
        entry: python3 scripts/check_imports.py
        language: system
        files: ^src/agent/.*\.py$
        pass_filenames: false